<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Traverse Field Book</title>
<style>
  :root {
    /* Brand: navy + yellow/gold + metallic silver */
    --navy: #1B3B6F;
    --navy-deep: #0F2038;
    --yellow: #FFC220;
    --yellow-dark: #E6A812;
    --silver: #C9D0D8;
    --silver-dim: #93A0AC;
    --accent: var(--yellow);
    --accent-active: var(--yellow-dark);
    --accent-2: var(--silver);

    /* Neutrals */
    --bg: #10141B;
    --header-bg: #171C24;
    --panel-bg: #1A2029;
    --panel-border: #29323D;
    --surface-2: #242C36;
    --surface-2-border: #333D46;
    --input-bg: #0C1016;
    --input-border: #2A3542;
    --row-border: #232B35;
    --compass-bg: #0F1216;
    --compass-tick: #3A434D;

    /* Text */
    --text-primary: #EDEFF2;
    --text-secondary: #8FA0AE;
    --text-dim: #5B6672;
    --text-data: #DADEE3;

    /* Status (semantic, not brand — left as-is on purpose) */
    --good: #5FD068;
    --bad: #FF6B6B;
  }
  @font-face { font-family: 'Space Grotesk'; src: local('Space Grotesk'); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    overscroll-behavior: none;
    user-select: none;
  }
  input, select { user-select: text; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ---- Header ---- */
  .brand-strip { height: 3px; flex-shrink: 0; background: linear-gradient(90deg, var(--navy) 0%, var(--yellow) 55%, var(--silver) 100%); }
  header {
    padding: 14px 16px 10px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px; font-weight: 700; letter-spacing: 0.02em;
    margin: 0 0 2px 0; color: var(--text-primary);
  }
  .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--text-secondary); }
  .status-left { display: flex; align-items: center; gap: 8px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 20px; font-size: 10.5px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .badge.ok { background: rgba(95,208,104,0.12); color: #5FD068; border: 1px solid rgba(95,208,104,0.3); }
  .badge.bad { background: rgba(255,85,85,0.12); color: #FF6B6B; border: 1px solid rgba(255,85,85,0.3); }
  .badge.neu { background: rgba(138,147,160,0.12); color: #8A93A0; border: 1px solid rgba(138,147,160,0.25); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  #save-indicator {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--accent-2); letter-spacing: 0.04em; opacity: 0; transition: opacity 0.35s ease;
  }
  #save-indicator.show { opacity: 1; }
  .btn-reset {
    background: transparent; color: var(--text-secondary); border: 1px solid var(--input-border);
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.03em;
    font-size: 10px; padding: 5px 10px; border-radius: 20px; cursor: pointer;
  }
  .btn-reset:active { color: var(--bad); border-color: var(--bad); }

  /* ---- Main scroll area ---- */
  main { flex: 1; overflow-y: auto; padding: 14px 14px 90px; }
  .panel {
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
  }
  .panel-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent); margin: 0 0 10px 0;
  }
  .panel-title-sm { font-size: 11px; margin-top: 2px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .row > * { flex: 1; }
  label.f { font-size: 10.5px; color: var(--text-secondary); display: block; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-data); }
  .checkbox-row input[type="checkbox"] { width: auto; }
  input, select {
    width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-primary);
    padding: 10px 8px; border-radius: 8px; font-size: 15px; font-family: 'JetBrains Mono', monospace;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select { font-family: inherit; -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238A93A0'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center; padding-right: 26px;
  }
  .bearing-input { font-size: 20px; text-align: center; letter-spacing: 0.03em; padding: 12px 8px; }
  .bearing-input-sm { font-size: 15px; }
  .bearing-preview {
    text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 15px;
    color: var(--accent-2); font-weight: 700; min-height: 20px; margin-top: 6px; letter-spacing: 0.02em;
  }
  .bearing-preview.pending { color: var(--text-dim); font-weight: 500; font-size: 12px; }
  .preview-sm { font-size: 11px; }

  button {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.02em;
    border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: var(--navy-deep); width: 100%; }
  .btn-primary:active { background: var(--accent-active); }
  .btn-secondary { background: var(--surface-2); color: var(--text-primary); border: 1px solid var(--surface-2-border); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--input-border); }
  tr.editing-row td { background: rgba(255,194,32,0.08); color: var(--accent); }
  .row-actions { display: flex; gap: 2px; justify-content: flex-end; }
  .btn-icon-ghost { background: transparent; border: none; padding: 6px 9px; font-size: 14px; color: var(--accent-2); }
  .btn-icon-ghost.danger { color: var(--bad); }

  table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
  th { text-align: right; color: var(--text-secondary); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 6px; border-bottom: 1px solid var(--input-border); }
  th:first-child, td:first-child { text-align: left; }
  td { text-align: right; padding: 7px 6px; border-bottom: 1px solid var(--row-border); color: var(--text-data); }
  tr:last-child td { border-bottom: none; }
  tfoot td { border-top: 1px solid var(--input-border); border-bottom: none; color: var(--text-primary); }
  .leg-name { color: var(--accent-2); font-weight: 700; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat {
    background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; padding: 10px;
  }
  .stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .stat-val.accent { color: var(--accent); }
  .stat-val.good { color: var(--good); }

  .method-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .method-toggle button { flex: 1; background: var(--input-bg); color: var(--text-secondary); border: 1px solid var(--input-border); padding: 9px; font-size: 12px; }
  .method-toggle button.active { background: rgba(255,194,32,0.12); color: var(--accent); border-color: var(--accent); }
  .method-toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .method-toggle-grid button { background: var(--input-bg); color: var(--text-secondary); border: 1px solid var(--input-border); padding: 9px 6px; font-size: 11.5px; }
  .method-toggle-grid button.active { background: rgba(255,194,32,0.12); color: var(--accent); border-color: var(--accent); }

  /* ---- Compass dial ---- */
  .compass-wrap { display: flex; justify-content: center; padding: 8px 0 4px; }

  /* ---- Plot ---- */
  .plot-wrap { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; overflow: hidden; }

  .empty-state { text-align: center; padding: 24px 10px; color: var(--text-dim); font-size: 13px; }
  .empty-state svg { opacity: 0.4; margin-bottom: 8px; }

  /* ---- Bottom nav ---- */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--header-bg); border-top: 1px solid var(--panel-border);
    display: flex; padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
    z-index: 10;
  }
  nav button {
    flex: 1; background: none; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 2px; color: var(--text-dim); font-size: 10px; font-weight: 600; font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.02em;
  }
  nav button.active { color: var(--accent); }
  nav button svg { width: 20px; height: 20px; }

  .divider { height: 1px; background: var(--input-border); margin: 10px 0; }
  .small-note { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 6px; }
  .close-icon { flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">
  <div class="brand-strip"></div>
  <header>
    <h1 id="proj-name">TRAVERSE FIELD BOOK</h1>
    <div class="status-row">
      <div class="status-left">
        <span id="badge-container"></span>
        <span id="leg-count-label">0 legs</span>
        <span id="save-indicator">SAVED</span>
      </div>
      <button class="btn-reset" onclick="resetJob()" title="Clear all legs and start a new job">NEW JOB</button>
    </div>
  </header>

  <main id="main"></main>

  <nav id="bottom-nav">
    <button data-tab="traverse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-10 5 6 7-10"/></svg>
      TRAVERSE
    </button>
    <button data-tab="closure">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      CLOSURE
    </button>
    <button data-tab="coords">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="14" cy="8" r="1.5" fill="currentColor"/><circle cx="18" cy="12" r="1.5" fill="currentColor"/></svg>
      PLOT
    </button>
    <button data-tab="missing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v18M15 3v18M3 9h18M3 15h18" stroke-dasharray="2 2"/></svg>
      MISSING
    </button>
  </nav>
</div>

<script>
/* =========================================================
   STATE
========================================================= */
const state = {
  tab: 'traverse',
  legs: [],          // {id, deg, min, sec, dist} — deg/min/sec is a whole-circle azimuth (0-360)
  method: 'compass',  // 'compass' | 'transit'
  startN: 1000.000,
  startE: 1000.000,
  missingMode: 'inverse',
  editingLegId: null,
  backsight: {
    startEnabled: false, startKnown: '', startObserved: '',
    finishEnabled: false, finishKnown: '', finishObserved: ''
  }
};
let legIdCounter = 1;

/* =========================================================
   PERSISTENCE (localStorage)
   Job data auto-saves on every data-mutating action (not on
   pure navigation like tab switches) and restores on load.
========================================================= */
const STORAGE_KEY = 'traverseFieldBook.v1';
let saveFlashTimer = null;

function saveState() {
  try {
    const payload = {
      legs: state.legs,
      method: state.method,
      startN: state.startN,
      startE: state.startE,
      backsight: state.backsight,
      legIdCounter
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    flashSaved();
  } catch (e) { /* storage unavailable (private browsing, quota) — fail silently */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.legs)) state.legs = data.legs;
    if (data.method === 'compass' || data.method === 'transit') state.method = data.method;
    if (typeof data.startN === 'number') state.startN = data.startN;
    if (typeof data.startE === 'number') state.startE = data.startE;
    if (data.backsight) state.backsight = { ...state.backsight, ...data.backsight };
    if (typeof data.legIdCounter === 'number') legIdCounter = data.legIdCounter;
  } catch (e) { /* corrupt/unavailable storage — start fresh */ }
}

function resetJob() {
  if (!confirm('Clear all legs and start a new job? This cannot be undone.')) return;
  state.legs = [];
  state.method = 'compass';
  state.startN = 1000.000;
  state.startE = 1000.000;
  state.editingLegId = null;
  state.backsight = { startEnabled: false, startKnown: '', startObserved: '', finishEnabled: false, finishKnown: '', finishObserved: '' };
  legIdCounter = 1;
  saveState();
  render();
}

function flashSaved() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(saveFlashTimer);
  saveFlashTimer = setTimeout(() => el.classList.remove('show'), 900);
}

/* =========================================================
   SURVEY MATH
========================================================= */
function dmsToDecimal(deg, min, sec) {
  return (Number(deg)||0) + (Number(min)||0)/60 + (Number(sec)||0)/3600;
}

// Parse DDD.MMSS field-entry format -> { deg, min, sec }
// Degrees = integer part. Fractional digits are read left-to-right as MM then SS,
// right-padded with zeros if the surveyor didn't type all 4 digits (e.g. "45.3" -> 45°30'00").
function parseDDDMMSS(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  const parts = String(raw).split('.');
  const deg = parseInt(parts[0], 10) || 0;
  let frac = (parts[1] || '').padEnd(4, '0').slice(0, 4);
  let min = parseInt(frac.slice(0, 2), 10) || 0;
  let sec = parseInt(frac.slice(2, 4), 10) || 0;
  if (min > 59) min = 59;
  if (sec > 59) sec = 59;
  return { deg, min, sec };
}

// A bearing entry is "complete" once 4 fractional digits (MMSS) have been typed
function isBearingComplete(raw) {
  const parts = String(raw || '').split('.');
  return parts.length === 2 && parts[1].length >= 4;
}

function azimuthToBearing(az) {
  az = ((az % 360) + 360) % 360;
  const deg = Math.floor(az);
  const minFull = (az - deg) * 60;
  const min = Math.floor(minFull);
  const sec = Math.round((minFull - min) * 60);
  return { deg, min, sec };
}

function legAzimuth(leg) {
  return dmsToDecimal(leg.deg, leg.min, leg.sec);
}

function computeLegVectors() {
  return state.legs.map(leg => {
    const az = legAzimuth(leg);
    const rad = az * Math.PI / 180;
    const dist = Number(leg.dist) || 0;
    const lat = dist * Math.cos(rad);   // ΔNorthing
    const dep = dist * Math.sin(rad);   // ΔEasting
    return { ...leg, az, dist, lat, dep };
  });
}

function computeClosure() {
  const vecs = computeLegVectors();
  const perimeter = vecs.reduce((s,v)=>s+v.dist,0);
  const sumLat = vecs.reduce((s,v)=>s+v.lat,0);
  const sumDep = vecs.reduce((s,v)=>s+v.dep,0);
  const linearError = Math.sqrt(sumLat*sumLat + sumDep*sumDep);
  const precisionDenom = linearError > 0 ? perimeter/linearError : Infinity;
  // Direction of the closing-error vector (start point -> computed end point).
  // Comparing this bearing against the legs points toward which one is the likely blunder.
  const miscloseAz = linearError > 0 ? (Math.atan2(sumDep, sumLat) * 180/Math.PI + 360) % 360 : 0;
  const miscloseBearing = azimuthToBearing(miscloseAz);
  return { vecs, perimeter, sumLat, sumDep, linearError, precisionDenom, miscloseAz, miscloseBearing };
}

function computeAdjusted() {
  const { vecs, perimeter, sumLat, sumDep } = computeClosure();
  const sumAbsLat = vecs.reduce((s,v)=>s+Math.abs(v.lat),0);
  const sumAbsDep = vecs.reduce((s,v)=>s+Math.abs(v.dep),0);

  return vecs.map(v => {
    let corrLat, corrDep;
    if (state.method === 'compass') {
      corrLat = perimeter > 0 ? -sumLat * (v.dist/perimeter) : 0;
      corrDep = perimeter > 0 ? -sumDep * (v.dist/perimeter) : 0;
    } else {
      corrLat = sumAbsLat > 0 ? -sumLat * (Math.abs(v.lat)/sumAbsLat) : 0;
      corrDep = sumAbsDep > 0 ? -sumDep * (Math.abs(v.dep)/sumAbsDep) : 0;
    }
    const adjLat = v.lat+corrLat, adjDep = v.dep+corrDep;
    const computedDist = Math.sqrt(adjLat*adjLat + adjDep*adjDep);
    const computedAz = (Math.atan2(adjDep, adjLat) * 180/Math.PI + 360) % 360;
    const computedBearing = azimuthToBearing(computedAz);
    return { ...v, corrLat, corrDep, adjLat, adjDep, computedDist, computedAz, computedBearing };
  });
}

function computeCoordinates() {
  const adj = computeAdjusted();
  let n = Number(state.startN)||0, e = Number(state.startE)||0;
  const pts = [{ label: 'P0 (Start)', n, e }];
  adj.forEach((v,i) => {
    n += v.adjLat; e += v.adjDep;
    pts.push({ label: `P${i+1}`, n, e });
  });
  return pts;
}

function inverse(n1,e1,n2,e2) {
  const dLat = n2-n1, dDep = e2-e1;
  const dist = Math.sqrt(dLat*dLat + dDep*dDep);
  const az = (Math.atan2(dDep, dLat) * 180/Math.PI + 360) % 360;
  return { dist, az, bearing: azimuthToBearing(az) };
}

// The unmeasured side needed to close the loop, given all legs entered so far.
function computeClosingLeg() {
  if (state.legs.length < 2) return null;
  const vecs = computeLegVectors();
  const sumLat = vecs.reduce((s,v)=>s+v.lat,0);
  const sumDep = vecs.reduce((s,v)=>s+v.dep,0);
  const missingLat = -sumLat, missingDep = -sumDep;
  const dist = Math.sqrt(missingLat*missingLat + missingDep*missingDep);
  const az = (Math.atan2(missingDep, missingLat) * 180/Math.PI + 360) % 360;
  return { dist, bearing: azimuthToBearing(az) };
}

/* =========================================================
   FORMATTERS
========================================================= */
const fmt = (n, d=3) => (Number.isFinite(n) ? n.toFixed(d) : '—');
const fmtBearing = b => `${String(b.deg).padStart(3,'0')}°${String(b.min).padStart(2,'0')}'${String(b.sec).padStart(2,'0')}"`;
const fmtLegBearing = leg => `${String(leg.deg||0).padStart(3,'0')}°${String(leg.min||0).padStart(2,'0')}'${String(leg.sec||0).padStart(2,'0')}"`;

/* =========================================================
   RENDER: HEADER
========================================================= */
function renderHeader() {
  const badgeEl = document.getElementById('badge-container');
  const countEl = document.getElementById('leg-count-label');
  countEl.textContent = `${state.legs.length} leg${state.legs.length!==1?'s':''}`;
  if (state.legs.length < 3) {
    badgeEl.innerHTML = `<span class="badge neu"><span class="dot"></span>NEED 3+ LEGS</span>`;
    return;
  }
  const { precisionDenom } = computeClosure();
  if (precisionDenom >= 5000) {
    badgeEl.innerHTML = `<span class="badge ok"><span class="dot"></span>CLOSED 1:${Math.round(precisionDenom).toLocaleString()}</span>`;
  } else if (precisionDenom >= 1000) {
    badgeEl.innerHTML = `<span class="badge neu"><span class="dot"></span>1:${Math.round(precisionDenom).toLocaleString()}</span>`;
  } else {
    badgeEl.innerHTML = `<span class="badge bad"><span class="dot"></span>POOR 1:${Math.round(precisionDenom).toLocaleString()}</span>`;
  }
}

/* =========================================================
   RENDER: BACKSIGHT ORIENTATION CHECK (optional, in Traverse tab)
========================================================= */
function renderBacksightPanel() {
  const bs = state.backsight;
  return `
    <div class="panel">
      <div class="panel-title">Backsight Orientation Check (optional)</div>
      <label class="checkbox-row" style="margin-bottom:${bs.startEnabled?'10px':'0'};">
        <input type="checkbox" id="bs-start-toggle" ${bs.startEnabled?'checked':''} onchange="toggleBacksight('start', this.checked)">
        Starting backsight
      </label>
      ${bs.startEnabled ? renderBacksightFields('start') : ''}
      <div class="divider"></div>
      <label class="checkbox-row" style="margin-bottom:${bs.finishEnabled?'10px':'0'};">
        <input type="checkbox" id="bs-finish-toggle" ${bs.finishEnabled?'checked':''} onchange="toggleBacksight('finish', this.checked)">
        Finishing backsight
      </label>
      ${bs.finishEnabled ? renderBacksightFields('finish') : ''}
      <div class="small-note">Enter the known control bearing to a backsight point, and what was actually observed to that same point. The difference is a genuine, independent orientation check — unlike the traverse bearings themselves, this can catch a real angular error.</div>
    </div>
  `;
}

function renderBacksightFields(which) {
  const bs = state.backsight;
  const known = bs[which+'Known'], observed = bs[which+'Observed'];
  return `
    <div class="row">
      <div>
        <label class="f">Known Bearing (DDD.MMSS)</label>
        <input id="bs-${which}-known" class="bearing-input bearing-input-sm" type="text" inputmode="decimal" placeholder="e.g. 45.3000" value="${known||''}" oninput="onBacksightInput('${which}','known', this)">
        <div id="bs-${which}-known-preview" class="bearing-preview pending preview-sm">${bearingPreviewText(known)}</div>
      </div>
      <div>
        <label class="f">Observed Bearing (DDD.MMSS)</label>
        <input id="bs-${which}-observed" class="bearing-input bearing-input-sm" type="text" inputmode="decimal" placeholder="e.g. 45.3020" value="${observed||''}" oninput="onBacksightInput('${which}','observed', this)">
        <div id="bs-${which}-observed-preview" class="bearing-preview pending preview-sm">${bearingPreviewText(observed)}</div>
      </div>
    </div>
    <div id="bs-${which}-result">${renderBacksightResult(which)}</div>
  `;
}

function bearingPreviewText(raw) {
  const parsed = parseDDDMMSS(raw);
  if (!raw || !parsed) return 'Type degrees.minutesseconds';
  return `${String(parsed.deg).padStart(3,'0')}°${String(parsed.min).padStart(2,'0')}'${String(parsed.sec).padStart(2,'0')}"`;
}

function fmtSignedBearing(decDeg) {
  const sign = decDeg < 0 ? '-' : '+';
  const abs = Math.abs(decDeg);
  const deg = Math.floor(abs);
  const minFull = (abs-deg)*60;
  const min = Math.floor(minFull);
  const sec = Math.round((minFull-min)*60);
  return `${sign}${deg}°${String(min).padStart(2,'0')}'${String(sec).padStart(2,'0')}"`;
}

function renderBacksightResult(which) {
  const bs = state.backsight;
  const known = parseDDDMMSS(bs[which+'Known']);
  const observed = parseDDDMMSS(bs[which+'Observed']);
  if (!known || !observed || !isBearingComplete(bs[which+'Known']) || !isBearingComplete(bs[which+'Observed'])) return '';
  const knownDec = dmsToDecimal(known.deg, known.min, known.sec);
  const obsDec = dmsToDecimal(observed.deg, observed.min, observed.sec);
  let diff = obsDec - knownDec;
  diff = ((diff + 180) % 360 + 360) % 360 - 180; // signed, -180..180
  const label = which === 'start' ? 'Starting Orientation Check' : 'Finishing Orientation Check';
  const good = Math.abs(diff) < (1/60); // within 1 arc-minute
  return `
    <div class="stat" style="margin-top:2px;">
      <div class="stat-label">${label}</div>
      <div class="stat-val ${good?'good':'accent'}">${fmtSignedBearing(diff)}</div>
    </div>
  `;
}

function toggleBacksight(which, checked) {
  state.backsight[which + 'Enabled'] = checked;
  saveState();
  render();
}

function onBacksightInput(which, field, el) {
  const cleaned = sanitizeBearingInput(el.value);
  if (cleaned !== el.value) el.value = cleaned;
  state.backsight[which + (field === 'known' ? 'Known' : 'Observed')] = cleaned;

  const previewEl = document.getElementById(`bs-${which}-${field}-preview`);
  if (previewEl) {
    previewEl.textContent = bearingPreviewText(cleaned);
    previewEl.classList.toggle('pending', !isBearingComplete(cleaned));
  }
  const resultEl = document.getElementById(`bs-${which}-result`);
  if (resultEl) resultEl.innerHTML = renderBacksightResult(which);
  saveState();
}

function sanitizeBearingInput(raw) {
  // digits + at most one decimal point, max 4 digits after the point
  let s = raw.replace(/[^0-9.]/g, '');
  const firstDot = s.indexOf('.');
  if (firstDot !== -1) {
    s = s.slice(0, firstDot+1) + s.slice(firstDot+1).replace(/\./g, '');
  }
  const [intPart, fracPart] = s.split('.');
  if (fracPart !== undefined) {
    s = intPart + '.' + fracPart.slice(0,4);
  }
  return s;
}

function onBearingInput(e) {
  const el = e.target;
  const cleaned = sanitizeBearingInput(el.value);
  if (cleaned !== el.value) el.value = cleaned;
  updateCompassNeedle();
  if (isBearingComplete(el.value)) {
    const distEl = document.getElementById('in-dist');
    if (distEl) { distEl.focus(); distEl.select(); }
  }
}

function updateCompassNeedle() {
  const svg = document.getElementById('compass-svg');
  const bearingEl = document.getElementById('in-bearing');
  const preview = document.getElementById('bearing-preview');
  if (!svg || !bearingEl) return;
  const raw = bearingEl.value;
  const parsed = parseDDDMMSS(raw);
  const az = parsed ? dmsToDecimal(parsed.deg, parsed.min, parsed.sec) : 0;

  if (preview) {
    if (parsed && raw !== '') {
      preview.textContent = `${String(parsed.deg).padStart(3,'0')}°${String(parsed.min).padStart(2,'0')}'${String(parsed.sec).padStart(2,'0')}"`;
      preview.classList.toggle('pending', !isBearingComplete(raw));
    } else {
      preview.textContent = 'Type degrees.minutesseconds';
      preview.classList.add('pending');
    }
  }

  const rad = (az - 90) * Math.PI/180; // svg 0deg = pointing right, we want 0=up(N)
  const r = 46;
  const x2 = 60 + r*Math.cos(rad);
  const y2 = 60 + r*Math.sin(rad);
  const needle = document.getElementById('compass-needle');
  needle.setAttribute('x2', x2);
  needle.setAttribute('y2', y2);
}

function emptyState(msg) {
  return `<div class="empty-state">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>
    <div>${msg}</div>
  </div>`;
}

function saveLeg() {
  const bearingEl = document.getElementById('in-bearing');
  const raw = bearingEl.value;
  const parsed = parseDDDMMSS(raw);
  if (!raw || !parsed) { flash('Enter a bearing in DDD.MMSS format'); return; }
  const dist = document.getElementById('in-dist').value;
  if (!dist || Number(dist) <= 0) { flash('Enter a distance greater than 0'); return; }

  if (state.editingLegId !== null) {
    const leg = state.legs.find(l => l.id === state.editingLegId);
    if (leg) { leg.deg = parsed.deg; leg.min = parsed.min; leg.sec = parsed.sec; leg.dist = dist; }
    state.editingLegId = null;
  } else {
    state.legs.push({ id: legIdCounter++, deg: parsed.deg, min: parsed.min, sec: parsed.sec, dist });
  }
  saveState();
  render();
  // Ready for the next leg immediately
  requestAnimationFrame(() => {
    const nextBearing = document.getElementById('in-bearing');
    if (nextBearing) nextBearing.focus();
  });
}

function editLeg(id) {
  const leg = state.legs.find(l => l.id === id);
  if (!leg) return;
  state.editingLegId = id;
  render();
  requestAnimationFrame(() => {
    const bearingEl = document.getElementById('in-bearing');
    const distEl = document.getElementById('in-dist');
    if (bearingEl) {
      bearingEl.value = `${leg.deg}.${String(leg.min).padStart(2,'0')}${String(leg.sec).padStart(2,'0')}`;
      updateCompassNeedle();
    }
    if (distEl) distEl.value = leg.dist;
    if (bearingEl) { bearingEl.focus(); bearingEl.select(); }
    document.getElementById('main').scrollTop = 0;
  });
}

function cancelEdit() {
  state.editingLegId = null;
  render();
}

function removeLeg(id) {
  if (state.editingLegId === id) state.editingLegId = null;
  state.legs = state.legs.filter(l => l.id !== id);
  saveState();
  render();
}

      </div>

function plotSvg(pts) {
  const W = 320, H = 260, pad = 30;
  const ns = pts.map(p=>p.n), es = pts.map(p=>p.e);
  const minN = Math.min(...ns), maxN = Math.max(...ns);
  const minE = Math.min(...es), maxE = Math.max(...es);
  const rangeN = Math.max(maxN-minN, 0.001), rangeE = Math.max(maxE-minE, 0.001);
  const scale = Math.min((W-2*pad)/rangeE, (H-2*pad)/rangeN);
  const cx = (e) => pad + (e-minE)*scale;
  const cy = (n) => H - pad - (n-minN)*scale; // invert so north is up

  const gridLines = [];
  for (let i=0;i<=8;i++) {
    const x = pad + i*(W-2*pad)/8;
    const y = pad + i*(H-2*pad)/8;
    gridLines.push(`<line x1="${x}" y1="${pad}" x2="${x}" y2="${H-pad}" stroke="var(--row-border)" stroke-width="1"/>`);
    gridLines.push(`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--row-border)" stroke-width="1"/>`);
  }

  const pathD = pts.map((p,i)=> `${i===0?'M':'L'} ${cx(p.e).toFixed(1)} ${cy(p.n).toFixed(1)}`).join(' ') +
    ` L ${cx(pts[0].e).toFixed(1)} ${cy(pts[0].n).toFixed(1)}`;

  const dots = pts.map((p,i)=>`
    <circle cx="${cx(p.e).toFixed(1)}" cy="${cy(p.n).toFixed(1)}" r="4" fill="${i===0?'var(--accent-2)':'var(--accent)'}" stroke="var(--bg)" stroke-width="1.5"/>
    <text x="${cx(p.e).toFixed(1)}" y="${(cy(p.n)-9).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--text-secondary)" font-family="JetBrains Mono">${p.label.replace(' (Start)','')}</text>
  `).join('');

  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;">
    ${gridLines.join('')}
    <path d="${pathD}" fill="none" stroke="var(--accent-2)" stroke-width="1.5" stroke-dasharray="4 3"/>
    ${dots}
  </svg>`;
}

function computeRadiation() {
  const b1 = parseDDDMMSS(document.getElementById('rad1-bearing').value);
  const b2 = parseDDDMMSS(document.getElementById('rad2-bearing').value);
  if (!b1 || !b2) { flash('Enter both bearings in DDD.MMSS format'); return; }
  const d1 = Number(document.getElementById('rad1-dist').value)||0;
  const d2 = Number(document.getElementById('rad2-dist').value)||0;
  const az1 = dmsToDecimal(b1.deg,b1.min,b1.sec) * Math.PI/180;
  const az2 = dmsToDecimal(b2.deg,b2.min,b2.sec) * Math.PI/180;
  const n1 = d1*Math.cos(az1), e1 = d1*Math.sin(az1);
  const n2 = d2*Math.cos(az2), e2 = d2*Math.sin(az2);
  const r = inverse(n1,e1,n2,e2);
  document.getElementById('radiation-result').innerHTML = `
    <div class="divider"></div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Bearing (Pt1 → Pt2)</div><div class="stat-val accent">${fmtBearing(r.bearing)}</div></div>
      <div class="stat"><div class="stat-label">Distance</div><div class="stat-val accent">${fmt(r.dist,3)} m</div></div>
    </div>
  `;
}

function renderCompare() {
  return `
    <div class="row">
      <div>
        <label class="f">Bearing A (DDD.MMSS)</label>
        <input id="cmp-a" class="bearing-input bearing-input-sm" type="text" inputmode="decimal" placeholder="e.g. 45.3000" oninput="onPlainBearingInput(this,'cmp-a-preview')">
        <div id="cmp-a-preview" class="bearing-preview pending preview-sm">Type degrees.minutesseconds</div>
      </div>
      <div>
        <label class="f">Bearing B (DDD.MMSS)</label>
        <input id="cmp-b" class="bearing-input bearing-input-sm" type="text" inputmode="decimal" placeholder="e.g. 90.0000" oninput="onPlainBearingInput(this,'cmp-b-preview')">
        <div id="cmp-b-preview" class="bearing-preview pending preview-sm">Type degrees.minutesseconds</div>
      </div>
    </div>
    <button class="btn-primary" onclick="computeCompare()">CALCULATE</button>
    <div id="compare-result"></div>
    <div class="small-note">Computes the angle between two bearings — how far, and which way, you'd turn from A to B.</div>
  `;
}
function computeCompare() {
  const a = parseDDDMMSS(document.getElementById('cmp-a').value);
  const b = parseDDDMMSS(document.getElementById('cmp-b').value);
  if (!a || !b) { flash('Enter both bearings in DDD.MMSS format'); return; }
  const aDec = dmsToDecimal(a.deg,a.min,a.sec);
  const bDec = dmsToDecimal(b.deg,b.min,b.sec);
  let diff = bDec - aDec;
  diff = ((diff + 180) % 360 + 360) % 360 - 180; // signed, -180..180
  const direction = diff === 0 ? '—' : (diff > 0 ? 'CLOCKWISE' : 'COUNTERCLOCKWISE');
  document.getElementById('compare-result').innerHTML = `
    <div class="divider"></div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Angle (B − A)</div><div class="stat-val accent">${fmtSignedBearing(diff)}</div></div>
      <div class="stat"><div class="stat-label">Turn Direction</div><div class="stat-val" style="font-size:13px;">${direction}</div></div>
    </div>
  `;
}

/* =========================================================
   MAIN RENDER / NAV
========================================================= */
function render() {
  renderHeader();
  const main = document.getElementById('main');
  if (state.tab === 'traverse') main.innerHTML = renderTraverse();
  else if (state.tab === 'closure') main.innerHTML = renderClosure();
  else if (state.tab === 'coords') main.innerHTML = renderCoords();
  else if (state.tab === 'missing') main.innerHTML = renderMissing();

  document.querySelectorAll('nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);
  });

  if (state.tab === 'traverse') {
    const bearingEl = document.getElementById('in-bearing');
    if (bearingEl) {
      bearingEl.addEventListener('input', onBearingInput);
      updateCompassNeedle();
    }
  }
}

function flash(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--bad);color:var(--navy-deep);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;z-index:99;font-family:Space Grotesk,sans-serif;';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1800);
}

document.getElementById('bottom-nav').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  state.tab = btn.dataset.tab;
  render();
  document.getElementById('main').scrollTop = 0;
});

loadState();
render();
</script>
</body>
</html>
